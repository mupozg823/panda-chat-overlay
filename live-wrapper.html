<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PandaTV Live Wrapper</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; background: transparent; }
    body { display: grid; grid-template-rows: auto 1fr; }
    .toolbar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; border-bottom: 1px solid rgba(255,255,255,0.1);
      background: rgba(18,21,28,0.88); color: #f5f7fb;
      font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .toolbar code { color: #9ba7bf; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status {
      margin-left: auto; padding: 3px 8px; border-radius: 999px;
      background: rgba(255,255,255,0.08); color: #9ba7bf; white-space: nowrap; font-size: 11px;
    }
    .status[data-tone="ok"] { color: #78dba9; }
    .status[data-tone="warn"] { color: #ffbf69; }
    .status[data-tone="error"] { color: #ff7b7b; }
    .frame-shell { position: relative; min-height: 0; background: transparent; }
    iframe { width: 100%; height: 100%; border: 0; background: transparent; display: block; }
    .empty { display: grid; place-items: center; padding: 32px; color: #9ba7bf; text-align: center; }
    /* OBS에서 toolbar 숨기기: ?obs=1 파라미터 */
  </style>
  <script>
    if (new URLSearchParams(location.search).has('obs')) {
      document.write('<style>.toolbar{display:none!important}body{grid-template-rows:1fr}</style>');
    }
  </script>
</head>
<body>
  <div class="toolbar">
    <strong>Live Wrapper</strong>
    <code id="targetLabel"></code>
    <span class="status" id="status" data-tone="warn">초기화 중</span>
  </div>
  <div class="frame-shell" id="frameShell">
    <div class="empty" id="emptyState">
      사용법: <code>?target=PandaTV채팅URL&css=base64CSS</code><br>
      설정기에서 <em>Wrapper URL</em> 버튼으로 자동 생성됩니다.
    </div>
    <iframe id="widgetFrame" title="PandaTV widget" referrerpolicy="no-referrer" style="display:none"></iframe>
  </div>
  <script src="scripts/live-wrapper.js"></script>
</body>
</html>
